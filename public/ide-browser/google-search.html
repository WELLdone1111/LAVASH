<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Пошук</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #202124;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .search-container {
            text-align: center;
            width: 100%;
            max-width: 584px;
            padding: 20px;
            box-sizing: border-box;
        }

        .logo {
            font-size: 75px;
            font-weight: 500;
            margin-bottom: 35px;
            letter-spacing: -2px;
            user-select: none;
        }
        .logo span:nth-child(1) { color: #4285F4; }
        .logo span:nth-child(2) { color: #EA4335; }
        .logo span:nth-child(3) { color: #FBBC05; }
        .logo span:nth-child(4) { color: #4285F4; }
        .logo span:nth-child(5) { color: #34A853; }
        .logo span:nth-child(6) { color: #EA4335; }

        .search-box {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
            margin: 0 auto;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            width: 20px;
            height: 20px;
            fill: #9aa0a6;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 12px 24px 12px 46px;
            font-size: 16px;
            border: 1px solid #5f6368;
            border-radius: 24px;
            background-color: #202124;
            color: #e8eaed;
            outline: none;
            transition: background-color 0.2s, box-shadow 0.2s, border-color 0.2s;
            box-sizing: border-box;
        }

        .search-input:focus, .search-input:hover {
            background-color: #303134;
            border-color: transparent;
            box-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
        }

        .buttons {
            margin-top: 28px;
            display: flex;
            justify-content: center;
        }

        .btn {
            background-color: #303134;
            border: 1px solid #303134;
            border-radius: 4px;
            color: #e8eaed;
            font-size: 14px;
            padding: 0 16px;
            line-height: 36px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            font-family: inherit;
        }

        .btn:hover {
            background-color: #3c4043;
            border: 1px solid #5f6368;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <div class="logo">
            <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
        </div>

        <form id="search-form" action="https://www.google.com/search" method="GET">
            <div class="search-box">
                <svg class="search-icon" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path>
                </svg>

                <input type="text" name="q" class="search-input" title="Пошук" autofocus required autocomplete="off">
            </div>

            <div class="buttons">
                <button type="submit" class="btn">Пошук Google</button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById("search-form")?.addEventListener("submit", (event) => {
            event.preventDefault();
            const input = event.currentTarget.querySelector('input[name="q"]');
            const query = input instanceof HTMLInputElement ? input.value.trim() : "";
            if (!query) return;
            window.parent.postMessage({ type: "lavash-ide-browser-search", query }, "*");
        });
    </script>
</body>
</html>
